<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlezone 3D - Computação Gráfica UTAD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Botão fullscreen -->
    <button id="btn-fullscreen" title="Fullscreen (F)">⛶</button>

    <!-- HUD sobreposto ao canvas -->
    <div id="hud">
        <!-- Canto superior esquerdo: vidas e score -->
        <div id="hud-left">
            <div id="hud-lives">VIDAS: ♥♥♥</div>
            <div id="hud-score">SCORE: 000000</div>
        </div>

        <!-- Canto superior direito: radar -->
        <canvas id="hud-radar" width="200" height="200"></canvas>
    </div>

    <!-- Canvas onde o Three.js desenha a cena -->
    <canvas id="battlezone-canvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/main.js"></script>
    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);

        document.addEventListener('keydown', e => {
            if (e.code === 'KeyF') toggleFullscreen();
        });
    </script>
</body>
</html>
