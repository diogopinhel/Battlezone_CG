<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlezone 3D - Computação Gráfica UTAD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Botão fullscreen -->
    <button id="btn-fullscreen" title="Fullscreen (F)">⛶</button>

    <!-- Mira central -->
    <div id="crosshair"></div>

    <!-- HUD sobreposto ao canvas -->
    <div id="hud">
        <!-- Canto superior esquerdo: vidas e score -->
        <div id="hud-left">
            <div id="hud-lives">VIDAS: ♥♥♥</div>
            <div id="hud-score">SCORE: 000000</div>
        </div>

        <!-- Canto superior direito: moldura do radar (o Three.js renderiza dentro via viewport) -->
        <div id="hud-radar-frame">
            <span id="hud-radar-label">RADAR</span>
        </div>
    </div>

    <!-- Ecrã de Game Over -->
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="go-score">PONTUAÇÃO: 000000</p>
        <p id="go-highscore">RECORDE:   000000</p>
        <button id="go-restart">JOGAR DE NOVO</button>
    </div>

    <!-- Canvas onde o Three.js desenha a cena -->
    <canvas id="battlezone-canvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/main.js"></script>
    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);

        document.addEventListener('keydown', e => {
            if (e.code === 'KeyF') toggleFullscreen();
        });

        document.getElementById('go-restart').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
